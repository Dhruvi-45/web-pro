<!DOCTYPE html>
<html>
<head>
  <title>HostelOS - Login</title>
  <link rel="stylesheet" href="/css/global.css">
</head>

<body>

<div class="container">
  <div class="header">
    <h1>HostelOS</h1>
    <p class="subtitle">Hostel Management System</p>
  </div>

  <div class="card">
    <h3>Welcome</h3>

    <input id="email" placeholder="Email" class="input">
    <input id="password" type="password" placeholder="Password" class="input">

    <button class="btn btn-primary" onclick="login()">Login</button>

    <br><br>
  </div>
</div>

<script>
async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const res = await fetch('/api/auth/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();

  if (data.success) {
  localStorage.setItem("user", JSON.stringify(data.user));

  if (data.user.role === "chief_warden") {
  window.location.href = "/chief-dashboard.html";
} else {
    window.location.href = `/${data.user.hostel}/dashboard.html`;
  }
} else {
  alert("Invalid credentials");
}
}
</script>

</body>
</html>
