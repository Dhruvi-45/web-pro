<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

</head>

<body>

<div id="root"></div>

<script type="text/babel">

// 🔥 yaha tum apna FULL JS paste karo (changes ke baad)
const { useCallback, useState } =React;

// ── Palette ────────────────────────────────────────────────────────────────────
const P = {
  vacant:  { bg: "#d4e9b0", border: "#5a8a2a", text: "#2e5010" },
  single:  { bg: "#f5d08a", border: "#c08a10", text: "#5a3a05" },
  double:  { bg: "#f0b080", border: "#c05a20", text: "#4a1a05" },
  stair:   { bg: "#a0bcd8", border: "#3a6898", text: "#0a2040" },
  empty:   { bg: "#f8f5ee", border: "transparent", text: "#999" },
};

const STATUS_CYCLE = ["vacant", "single", "double"];

const GLOBAL_CSS = `
  body, #root {
    margin: 0; padding: 0;
    background: #f0ece0;
    background-image:
      repeating-linear-gradient(0deg,  transparent, transparent 27px, rgba(100,90,70,.07) 27px, rgba(100,90,70,.07) 28px),
      repeating-linear-gradient(90deg, transparent, transparent 27px, rgba(100,90,70,.04) 27px, rgba(100,90,70,.04) 28px);
    min-height: 100vh;
  }
  .bh5-room:hover {
    filter: brightness(.82) !important;
    transform: scale(1.1);
    z-index: 20;
    position: relative;
    box-shadow: 0 2px 8px rgba(0,0,0,.22);
  }
`;

// ── Room metadata (Floor 0 only) ───────────────────────────────────────────────
function buildRoomData() {
  const floor = 0;
  const seed = (n, f) => STATUS_CYCLE[((n * 7 + f * 13) % 3 + 3) % 3];
  const rooms = {};

  [...Array(12)].forEach((_, i) => {
    const n = 501 + i;
    if (n === 510) return;
    rooms[n] = { wing: "Top Wing", side: "North", type: n % 3 === 0 ? "Two-Sitter" : "One-Sitter", status: seed(n, floor), floor };
  });
  [...Array(9)].forEach((_, i) => {
    const n = 513 + i;
    rooms[n] = { wing: "Top Wing", side: "South", type: n % 2 === 0 ? "Two-Sitter" : "One-Sitter", status: seed(n, floor), floor };
  });
  [...Array(11)].forEach((_, i) => {
    const n = 522 + i;
    rooms[n] = { wing: "Bottom Wing", side: "North", type: n % 3 === 0 ? "Two-Sitter" : "One-Sitter", status: seed(n, floor), floor };
  });
  [...Array(9)].forEach((_, i) => {
    const n = 534 + i;
    rooms[n] = { wing: "Bottom Wing", side: "South", type: n % 2 === 0 ? "Two-Sitter" : "One-Sitter", status: seed(n, floor), floor };
  });
  return rooms;
}

// ── Tooltip bar ────────────────────────────────────────────────────────────────
function TooltipBar({ data, visible }) {
  if (!visible || !data) {
    return (
      <div style={tipBarStyle}>
        <span style={{ color: "#9a9080" }}>Hover over any room to see details</span>
      </div>
    );
  }
  const { num, wing, side, type, status, floor } = data;
  const statusLabel = status === "vacant" ? "Vacant" : status === "single" ? "Single Occupied" : "Double Occupied";
  const dot = <span style={{ color: "#bcbaa8", margin: "0 7px" }}>·</span>;
  return (
    <div style={tipBarStyle}>
      <strong style={{ color: "#18160e" }}>BH5-{num}</strong>
      {dot}{statusLabel}{dot}{wing}{dot}Floor <strong style={{ color: "#18160e" }}>{floor}</strong>
      {dot}Type: {type}{dot}{side} Block
    </div>
  );
}

const tipBarStyle = {
  background: "#f8f5ee",
  border: "1.5px solid #7a7060",
  borderRadius: 2,
  padding: "5px 12px",
  fontSize: 11,
  color: "#5a5040",
  marginTop: 8,
  minHeight: 28,
  display: "flex",
  alignItems: "center",
  gap: 4,
  fontFamily: "'Courier New', Courier, monospace",
};

// ── Staircase cell ─────────────────────────────────────────────────────────────
function Stair({ size = { w: 44, h: 40 } }) {
  const stripes = [];
  for (let y = 0; y < size.h; y += 4.5) stripes.push(y);
  return (
    <div title="Staircase" style={{
      width: size.w, minWidth: size.w, height: size.h,
      border: `1px solid ${P.stair.border}`,
      background: P.stair.bg,
      position: "relative", overflow: "hidden", flexShrink: 0,
      borderRadius: 1,
    }}>
      <svg width={size.w} height={size.h} style={{ position: "absolute", inset: 0 }}>
        {stripes.map((y, i) => (
          <line key={i} x1={0} y1={y} x2={size.w} y2={y}
            stroke="#3a6898" strokeWidth={0.8} opacity={0.55} />
        ))}
      </svg>
      <span style={{
        position: "relative", zIndex: 1,
        display: "flex", height: "100%",
        alignItems: "center", justifyContent: "center",
        fontSize: 10, color: P.stair.text, fontWeight: 700,
      }}>▲</span>
    </div>
  );
}

// ── Room cell ──────────────────────────────────────────────────────────────────
function Room({ num, meta, onEnter, onLeave, onMove }) {
  const pal = meta ? P[meta.status] : P.empty;
  return (
    <div
      className="bh5-room"
      onMouseEnter={e => onEnter(e, num, meta)}
      onMouseLeave={onLeave}
      onMouseMove={onMove}
      style={{
        flex: "1 1 0", minWidth: 44, height: 40,
        border: `1px solid ${pal.border}`,
        background: pal.bg, color: pal.text,
        display: "flex", alignItems: "center", justifyContent: "center",
        fontSize: 9, fontWeight: 700, cursor: "default",
        userSelect: "none", flexShrink: 0,
        fontFamily: "'Courier New', monospace",
        borderRadius: 1,
        letterSpacing: -0.3,
        transition: "filter .1s, transform .1s",
      }}
    >
      {num}
    </div>
  );
}

// ── Wing (no heading) ──────────────────────────────────────────────────────────
function Wing({ topRooms, bottomRooms, roomData, onEnter, onLeave, onMove }) {
  return (
    <div style={{
      border: "1.5px solid #7a7060",
      borderRadius: 2,
      background: "#f8f5ee",
      overflow: "hidden",
    }}>
      {/* Top row */}
      <div style={{ display: "flex", gap: 2, padding: "4px 4px 2px", borderBottom: "1px solid #bcbaa8" }}>
        {topRooms.map((item, i) =>
          item === "stair"
            ? <Stair key={`stair-${i}`} />
            : <Room key={item} num={item} meta={roomData[item]} onEnter={onEnter} onLeave={onLeave} onMove={onMove} />
        )}
      </div>

      {/* Corridor */}
      <div style={{
        height: 26,
        background: "repeating-linear-gradient(90deg,#e8e4d8 0,#e8e4d8 8px,#dedad1 8px,#dedad1 9px)",
        display: "flex", alignItems: "center", justifyContent: "center",
        borderTop: "1px solid #bcbaa8",
        borderBottom: "1px solid #bcbaa8",
      }}>
        <span style={{ fontSize: 8, color: "#888", letterSpacing: 2, textTransform: "uppercase", fontFamily: "'Courier New', monospace" }}>
          — corridor —
        </span>
      </div>

      {/* Bottom row */}
      <div style={{ display: "flex", gap: 2, padding: "2px 4px 4px" }}>
        {bottomRooms.map((item, i) =>
          item === "stair"
            ? <Stair key={`stair-${i}`} />
            : <Room key={item} num={item} meta={roomData[item]} onEnter={onEnter} onLeave={onLeave} onMove={onMove} />
        )}
      </div>
    </div>
  );
}

// ── Legend ─────────────────────────────────────────────────────────────────────
function Legend() {
  const items = [
    ["#d4e9b0", "#5a8a2a", "Vacant / One-Sitter"],
    ["#f5d08a", "#c08a10", "Single Occ. / Two-Sitter"],
    ["#f0b080", "#c05a20", "Double Occ. / Three-Sitter"],
    [null,      "#3a6898", "Staircase / Utility"],
    ["repeating-linear-gradient(90deg,#e8e4d8 0,#e8e4d8 8px,#dedad1 8px,#dedad1 9px)", "#bcbaa8", "Corridor"],
  ];
  return (
    <div style={{
      display: "flex", flexWrap: "wrap", gap: 10, alignItems: "center",
      padding: "7px 12px", background: "#f8f5ee",
      border: "1.5px solid #7a7060", borderRadius: 2,
      marginBottom: 10, fontFamily: "'Courier New', monospace",
    }}>
      <strong style={{ fontSize: 11, color: "#666", marginRight: 4 }}>LEGEND:</strong>
      {items.map(([bg, border, label]) => (
        <div key={label} style={{ display: "flex", alignItems: "center", gap: 6 }}>
          <div style={{
            width: 14, height: 10, borderRadius: 1,
            background: bg ?? "repeating-linear-gradient(45deg,#a0bcd8,#a0bcd8 3px,rgba(58,104,152,.3) 3px,rgba(58,104,152,.3) 6px)",
            border: `1px solid ${border}`,
            flexShrink: 0,
          }} />
          <span style={{ fontSize: 9.5, color: "#5a5040" }}>{label}</span>
        </div>
      ))}
    </div>
  );
}

// ── Footer note ────────────────────────────────────────────────────────────────
function FooterNote({ roomData }) {
  const vals = Object.values(roomData);
  const v = vals.filter(r => r.status === "vacant").length;
  const s = vals.filter(r => r.status === "single").length;
  const d = vals.filter(r => r.status === "double").length;
  return (
    <div style={{
      display: "flex", gap: 8, flexWrap: "wrap",
      marginTop: 12, borderTop: "1px solid #bcbaa8", paddingTop: 8,
    }}>
      <div style={{
        border: "1.5px solid #7a7060", padding: "8px 20px",
        background: "#e8e4d8", fontSize: 9, lineHeight: 1.9,
        textAlign: "center", borderRadius: 2, flex: 1,
        fontFamily: "'Courier New', monospace",
      }}>
        <strong>Floor 0 (Ground Floor) — BH5</strong><br />
        Room Range: 501–542 &nbsp;·&nbsp; Top Wing: 501–521 &nbsp;·&nbsp; Bottom Wing: 522–542<br />
        Vacant: {v} &nbsp;·&nbsp; Single Occ.: {s} &nbsp;·&nbsp; Double Occ.: {d} &nbsp;·&nbsp; Total: {vals.length}
      </div>
      <div style={{
        border: "1.5px solid #7a7060", padding: "8px 14px",
        background: "#f8f5ee", fontSize: 9, lineHeight: 1.9,
        borderRadius: 2, flex: 1,
        fontFamily: "'Courier New', monospace",
      }}>
        <strong>NOTE:</strong><br />
        Two wings: Top Wing (501–521) &amp; Bottom Wing (522–542)<br />
        Each wing has North &amp; South rows with a Corridor in between<br />
        Staircases marked with ▲ between room groups
      </div>
    </div>
  );
}

// ── App ────────────────────────────────────────────────────────────────────────Ffufunction App() {
  const [tipData, setTipData] = useState({ visible: false, data: null });
  const roomData = buildRoomData();

  const handleEnter = useCallback((e, num, meta) => {
    setTipData({ visible: true, data: { num, ...meta } });
  }, []);
  const handleLeave = useCallback(() => setTipData(t => ({ ...t, visible: false })), []);
  const handleMove  = useCallback(() => {}, []);

  const topUpper = [501,502,503,504,505,506,507,508,509,"stair",510,511,512];
  const topLower = [513,514,515,516,517,518,519,520,521];
  const botUpper = [522,523,524,525,526,527,528,529,530,"stair",531,532];
  const botLower = [534,535,536,537,538,539,540,541,542];

  return (
    <>
      <style>{GLOBAL_CSS}</style>

      <div style={{
        fontFamily: "'Courier New', Courier, monospace",
        minHeight: "100vh",
        padding: "16px 12px 40px",
        color: "#18160e",
      }}>

        {/* Title */}
        <div style={{ marginBottom: 10 }}>
          <div style={{
            display: "inline-block",
            border: "2px solid #7a7060", background: "#f8f5ee",
            padding: "7px 14px 8px", borderRadius: 2,
          }}>
            <h1 style={{ fontSize: 14, fontWeight: 700, letterSpacing: 0.3, color: "#18160e", margin: 0 }}>
              Boys Hostel — Floor Plan Visualizer
            </h1>
            <p style={{ fontSize: 9.5, color: "#5a5040", marginTop: 2 }}>
              Floor 0 (Ground Floor)
            </p>
          </div>
        </div>

        <Legend />

        {/* Blueprint canvas */}
        <div style={{
          background: "#f8f5ee",
          border: "2.5px solid #7a7060",
          borderRadius: 3,
          padding: 10,
          boxShadow: "4px 4px 0 rgba(0,0,0,.08), 8px 8px 0 rgba(0,0,0,.04)",
          overflowX: "auto",
        }}>
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            <Wing
              topRooms={topUpper}
              bottomRooms={topLower}
              roomData={roomData}
              onEnter={handleEnter}
              onLeave={handleLeave}
              onMove={handleMove}
            />
            <Wing
              topRooms={botUpper}
              bottomRooms={botLower}
              roomData={roomData}
              onEnter={handleEnter}
              onLeave={handleLeave}
              onMove={handleMove}
            />
          </div>

          <FooterNote roomData={roomData} />
        </div>

        {/* Tooltip bar */}
        <TooltipBar data={tipData.data} visible={tipData.visible} />
      </div>
    </>
  );
}
  const root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(<App />);
</script>

</body>
</html>
