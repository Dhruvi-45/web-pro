<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Girls Hostel — Floor Plan</title>
<link rel="stylesheet" href="gh.css">
</head>
<body>

<!-- ═══════════════════════════════════════
     PAGE HEADER
═══════════════════════════════════════ -->
<div class="page-header">
  <div class="title-box">
    <h1>Girls Hostel — Floor Plan</h1>
    <p id="floorSub">Floor 0 (Ground Floor) — Wings A + B + C</p>
  </div>
</div>

<!-- Floor selector buttons (injected by JS) -->
<div class="floor-sel" id="floorSel"></div>

<!-- Color Coding -->
<div class="legend">
  <strong>COLOR CODING:</strong>
  <div class="li"><div class="lb" style="background:var(--vacant); border-color:var(--vacant-b)"></div>Vacant</div>
  <div class="li"><div class="lb" style="background:var(--full);   border-color:var(--full-b)"  ></div>Fully Occupied</div>
  <div class="li"><div class="lb" style="background:var(--triple); border-color:var(--triple-b)"></div>Triple Room</div>
  <div class="li"><div class="lb" style="background:var(--maint);  border-color:var(--maint-b)" ></div>Under Maintenance</div>
  <div class="li">
    <div class="lb" style="
      background: var(--wash); border-color: var(--wash-b);
      background-image: repeating-linear-gradient(45deg,transparent,transparent 3px,rgba(58,104,152,.25) 3px,rgba(58,104,152,.25) 6px);
    "></div>Washroom
  </div>
</div>

<!-- Blueprint canvas -->
<div class="blueprint" id="bp"></div>

<!-- Hover info bar -->
<div class="tip" id="tip">Hover over any room to see details</div>


<script src="gh.js"></script>
</body>
</html>
