<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Girls Hostel — Floor Plan</title>
<style>

/* ══════════════════════════════════════════════
   RESET & CSS VARIABLES
══════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* Occupancy colours */
  --vacant:   #d4e9b0; --vacant-b:  #5a8a2a; --vacant-t:  #2e5010;
  --single:   #f5d08a; --single-b:  #c08a10; --single-t:  #5a3a05;
  --double:   #f0b080; --double-b:  #c05a20; --double-t:  #4a1a05;
  --full:     #c8687a; --full-b:    #8c2a38; --full-t:    #ffffff;
  --maint:    #c8c4b8; --maint-b:   #808070; --maint-t:   #383830;
  /* Special cells */
  --wash:     #a0bcd8; --wash-b:    #3a6898; --wash-t:    #0a2040;
  --stair:    #dedad0; --stair-b:   #a09880;
  --court:    #e8e4d8; --court-b:   #bcbaa8;
  /* Page */
  --bg:       #f0ece0;
  --paper:    #f8f5ee;
  --line:     #7a7060;
  --text:     #18160e;
  --muted:    #5a5040;
  --accent:   #8c2a38;
  /* Wing accent colours */
  --wingA:    #1a4a8a;
  --wingB:    #0d5c40;
  --wingC:    #7a3e08;
}

/* ══════════════════════════════════════════════
   PAGE SHELL
══════════════════════════════════════════════ */
body {
  font-family: 'Courier New', Courier, monospace;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 16px 12px 40px;
  background-image:
    repeating-linear-gradient(0deg,  transparent, transparent 27px, rgba(100,90,70,.07) 27px, rgba(100,90,70,.07) 28px),
    repeating-linear-gradient(90deg, transparent, transparent 27px, rgba(100,90,70,.04) 27px, rgba(100,90,70,.04) 28px);
}

/* ── page header ── */
.page-header {
  max-width: 1020px; margin: 0 auto 10px;
  display: flex; align-items: flex-start; justify-content: space-between;
  flex-wrap: wrap; gap: 8px;
}
.title-box {
  border: 2px solid var(--line); background: var(--paper);
  padding: 7px 14px 8px; border-radius: 2px;
}
.title-box h1 { font-size: 14px; font-weight: 700; letter-spacing: .3px; color: var(--text); }
.title-box p  { font-size: 9.5px; color: var(--muted); margin-top: 2px; }

/* ── floor selector ── */
.floor-sel {
  display: flex; gap: 5px; flex-wrap: wrap;
  margin: 0 auto 10px; max-width: 1020px;
}
.fbtn {
  padding: 5px 14px; font-size: 11px; font-weight: 700;
  font-family: inherit; border-radius: 2px; cursor: pointer;
  border: 1.5px solid var(--line); background: var(--paper);
  color: var(--muted); letter-spacing: .5px; transition: all .12s;
}
.fbtn:hover  { border-color: var(--accent); color: var(--accent); }
.fbtn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* ── blueprint canvas ── */
.blueprint {
  max-width: 1020px; margin: 0 auto;
  background: var(--paper); border: 2.5px solid var(--line);
  border-radius: 3px; padding: 10px;
  box-shadow: 4px 4px 0 rgba(0,0,0,.08), 8px 8px 0 rgba(0,0,0,.04);
}

/* ── hover info bar ── */
.tip {
  background: var(--paper); border: 1.5px solid var(--line);
  border-radius: 2px; padding: 5px 12px; font-size: 11px;
  color: var(--muted); max-width: 1020px; margin: 8px auto 0;
  min-height: 28px; display: flex; align-items: center; gap: 8px;
}
.tip strong { color: var(--text); }

/* ══════════════════════════════════════════════
   CELL STYLES
══════════════════════════════════════════════ */

/* ── standard room block ── */
.room {
  display: flex; align-items: center; justify-content: center;
  font-size: 7px; font-weight: 700; font-family: 'Courier New', monospace;
  border-radius: 1px; border: 1px solid;
  cursor: default; user-select: none;
  text-align: center; line-height: 1.05;
  transition: filter .1s, transform .1s;
  flex-shrink: 0; letter-spacing: -.3px;
}
.room:hover {
  filter: brightness(.8); transform: scale(1.12);
  z-index: 20; position: relative;
  box-shadow: 0 2px 8px rgba(0,0,0,.22);
}

/* ── washroom block ── */
.wash {
  display: flex; align-items: center; justify-content: center;
  flex-direction: column;
  font-size: 6px; font-weight: 700; font-family: 'Courier New', monospace;
  background: var(--wash); border: 1.5px solid var(--wash-b);
  color: var(--wash-t); border-radius: 2px;
  flex-shrink: 0; text-align: center; line-height: 1.3;
  background-image: repeating-linear-gradient(
    45deg, transparent, transparent 3px,
    rgba(58,104,152,.15) 3px, rgba(58,104,152,.15) 6px
  );
}
.wash svg { display: block; margin: 1px auto 0; opacity: .7; }

/* ── staircase block ── */
.stair {
  display: flex; align-items: center; justify-content: center;
  font-size: 5.5px; font-weight: 700; font-family: 'Courier New', monospace;
  background: var(--stair); border: 1px solid var(--stair-b);
  color: #666; border-radius: 1px; flex-shrink: 0;
  text-align: center; letter-spacing: .2px;
  background-image: repeating-linear-gradient(
    0deg, transparent, transparent 3px,
    rgba(0,0,0,.06) 3px, rgba(0,0,0,.06) 4px
  );
}

/* ── open corridor / courtyard area ── */
.courtyard {
  background: var(--court); border: 2px solid var(--court-b);
  border-radius: 5px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 3px;
  background-image:
    radial-gradient(ellipse at center, rgba(160,200,140,.12) 0%, transparent 65%),
    repeating-linear-gradient(0deg,  transparent, transparent 9px, rgba(0,0,0,.025) 9px, rgba(0,0,0,.025) 10px),
    repeating-linear-gradient(90deg, transparent, transparent 9px, rgba(0,0,0,.025) 9px, rgba(0,0,0,.025) 10px);
}
.ct-title { font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: 1.5px; text-align: center; }
.ct-sub   { font-size: 8px;  color: var(--muted); opacity: .65; letter-spacing: .8px; }

/* ── wing labels ── */
.wing-side-lbl {
  writing-mode: vertical-rl; text-orientation: mixed;
  font-size: 11px; font-weight: 700; letter-spacing: 2px;
  color: #fff; padding: 6px 4px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 1px;
}
.section-hdr {
  font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
  padding: 4px 10px; border-radius: 1px;
  display: inline-block; color: #fff;
}

/* ── info boxes ── */
.stats-box {
  border: 1.5px solid var(--line); padding: 8px 20px;
  background: var(--court); font-size: 9px; line-height: 1.9;
  text-align: center; border-radius: 2px;
}
.note-box {
  border: 1.5px solid var(--line); padding: 8px 14px;
  background: var(--paper); font-size: 9px; line-height: 1.9;
  border-radius: 2px;
}

/* ══════════════════════════════════════════════
   LEGEND
══════════════════════════════════════════════ */
.legend {
  display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
  padding: 7px 12px; background: var(--paper);
  border: 1.5px solid var(--line); border-radius: 2px;
  font-size: 9.5px; color: var(--muted);
  max-width: 1020px; margin: 0 auto 10px; letter-spacing: .3px;
}
.li { display: flex; align-items: center; gap: 4px; }
.lb { width: 14px; height: 10px; border-radius: 1px; border: 1px solid; }

/* ── flex layout helpers ── */
.row { display: flex; flex-direction: row;    gap: 2px; align-items: center; }
.col { display: flex; flex-direction: column; gap: 2px; }

</style>
</head>
<body>

<!-- ═══════════════════════════════════════
     PAGE HEADER
═══════════════════════════════════════ -->
<div class="page-header">
  <div class="title-box">
    <h1>Girls Hostel — Floor Plan</h1>
    <p id="floorSub">Floor 0 (Ground Floor) — Wings A + B + C</p>
  </div>
</div>

<!-- Floor selector buttons (injected by JS) -->
<div class="floor-sel" id="floorSel"></div>

<!-- Legend -->
<div class="legend">
  <strong>LEGEND (ROOM OCCUPANCY):</strong>
  <div class="li"><div class="lb" style="background:var(--vacant); border-color:var(--vacant-b)"></div>Vacant</div>
  <div class="li"><div class="lb" style="background:var(--single); border-color:var(--single-b)"></div>Single Occupied</div>
  <div class="li"><div class="lb" style="background:var(--double); border-color:var(--double-b)"></div>Double Occupied</div>
  <div class="li"><div class="lb" style="background:var(--full);   border-color:var(--full-b)"  ></div>Full / Triple</div>
  <div class="li"><div class="lb" style="background:var(--maint);  border-color:var(--maint-b)" ></div>Maintenance</div>
  <div class="li">
    <div class="lb" style="
      background: var(--wash); border-color: var(--wash-b);
      background-image: repeating-linear-gradient(45deg,transparent,transparent 3px,rgba(58,104,152,.25) 3px,rgba(58,104,152,.25) 6px);
    "></div>Washroom
  </div>
</div>

<!-- Blueprint canvas -->
<div class="blueprint" id="bp"></div>

<!-- Hover info bar -->
<div class="tip" id="tip">Hover over any room to see details</div>


<script>
/* ══════════════════════════════════════════════════════════
   DATA TABLES
══════════════════════════════════════════════════════════ */

/* Wing accent colours */
const WC = {
  A: '#1a4a8a',
  B: '#0d5c40',
  C: '#7a3e08',
};

/* Occupancy status styles */
const SS = {
  vacant: { bg: 'var(--vacant)', b: 'var(--vacant-b)', t: 'var(--vacant-t)', lbl: 'Vacant'          },
  single: { bg: 'var(--single)', b: 'var(--single-b)', t: 'var(--single-t)', lbl: 'Single Occupied'  },
  double: { bg: 'var(--double)', b: 'var(--double-b)', t: 'var(--double-t)', lbl: 'Double Occupied'  },
  full:   { bg: 'var(--full)',   b: 'var(--full-b)',   t: 'var(--full-t)',   lbl: 'Full / Triple'    },
  maint:  { bg: 'var(--maint)',  b: 'var(--maint-b)',  t: 'var(--maint-t)', lbl: 'Maintenance'       },
};

/*
 * Room type metadata per wing key — shown in hover tooltip.
 */
const ROOM_META = {
  A:  { name: 'Wing A',             type: 'Two-Sitter',  pos: 'A-Wing Left/Right Breadth' },
  AT: { name: 'Wing A — Top Row',   type: 'Two-Sitter',  pos: 'A-Wing Top Perimeter'      },
  B:  { name: 'Wing B — Side',      type: 'One-Sitter',  pos: 'B-Wing Left & Right Side'  },
  BC: { name: 'Wing B — Centre',    type: 'Two-Sitter',  pos: 'B-Wing Centre'             },
  BR: { name: 'Wing B — Bottom Row',type: 'One-Sitter',  pos: 'Bottom Perimeter'          },
  C:  { name: 'Wing C',             type: 'Two-Sitter',  pos: 'C-Wing Left & Right Breadth'},
  CR: { name: 'Wing C — Bottom Row',type: 'One-Sitter',  pos: 'C-Wing Bottom Perimeter'   },
};

/* Reference to the hover-info bar */
const tipEl = document.getElementById('tip');


/* ══════════════════════════════════════════════════════════
   OCCUPANCY SEED FUNCTION
   Deterministic pseudo-random: same floor+wing+room always
   returns the same status so the UI is stable across re-renders.
══════════════════════════════════════════════════════════ */
function occ(floor, wingChar, num) {
  const seed = floor * 41 + wingChar.charCodeAt(0) * 23 + num * 13;
  const h = seed % 100;
  if (h < 28) return 'vacant';
  if (h < 52) return 'single';
  if (h < 72) return 'double';
  if (h < 86) return 'full';
  return 'maint';
}


/* ══════════════════════════════════════════════════════════
   DOM FACTORY HELPERS
══════════════════════════════════════════════════════════ */
function mkDiv(inlineStyle, className) {
  const el = document.createElement('div');
  if (className)   el.className     = className;
  if (inlineStyle) el.style.cssText = inlineStyle;
  return el;
}

function mkRow(extraStyle) {
  return mkDiv('display:flex;flex-direction:row;gap:2px;align-items:center;' + (extraStyle || ''));
}

function mkCol(extraStyle) {
  return mkDiv('display:flex;flex-direction:column;gap:2px;' + (extraStyle || ''));
}


/* ══════════════════════════════════════════════════════════
   STANDARD ROOM CELL
   wingPrefix — display prefix for the room code (e.g. 'A', 'B', 'C')
   seedChar   — single letter used for occ() seed ('A','B','C' etc.)
   floor      — floor index 0–4
   num        — room number within this wing/row (1-based)
   metaKey    — key into ROOM_META for tooltip display info
   w, h       — pixel dimensions
══════════════════════════════════════════════════════════ */
function mkRoom(wingPrefix, seedChar, floor, num, metaKey, w, h) {
  w = w || 40;
  h = h || 22;
  metaKey = metaKey || wingPrefix;

  const status   = occ(floor, seedChar, num);
  const st       = SS[status];
  const meta     = ROOM_META[metaKey] || { name: 'Wing ' + wingPrefix, type: 'Two-Sitter', pos: '' };
  /* Room code: [Wing][Floor][RoomNum two-digit] e.g. A101 */
  const roomCode = wingPrefix + floor + String(num).padStart(2, '0');

  const el = mkDiv(
    'width:' + w + 'px;height:' + h + 'px;' +
    'background:' + st.bg + ';border-color:' + st.b + ';color:' + st.t + ';',
    'room'
  );
  el.textContent = roomCode;

  /* Rich hover tooltip */
  el.onmouseenter = () => {
    tipEl.innerHTML =
      '<strong>' + roomCode + '</strong>'                                         +
      ' &nbsp;·&nbsp; ' + st.lbl                                                 +
      ' &nbsp;·&nbsp; <strong>' + meta.name + '</strong>'                        +
      ' &nbsp;·&nbsp; Floor&nbsp;<strong>' + floor + '</strong>'                 +
      ' &nbsp;·&nbsp; Room&nbsp;<strong>' + String(num).padStart(2,'0') + '</strong>' +
      ' &nbsp;·&nbsp; Type:&nbsp;<strong>' + meta.type + '</strong>'             +
      ' &nbsp;·&nbsp; <em style="opacity:.7">' + meta.pos + '</em>';
  };
  el.onmouseleave = () => { tipEl.textContent = 'Hover over any room to see details'; };

  return el;
}


/* ══════════════════════════════════════════════════════════
   WASHROOM CELL
══════════════════════════════════════════════════════════ */
function mkWash(label, sub, w, h) {
  const el = mkDiv('width:' + w + 'px;height:' + h + 'px;', 'wash');
  const personIcon =
    '<svg width="10" height="12" viewBox="0 0 10 12" fill="none">' +
      '<circle cx="5" cy="3" r="2.2" fill="#3a6898"/>' +
      '<rect x="1.5" y="6" width="7" height="5" rx="1.5" fill="#3a6898"/>' +
    '</svg>';
  el.innerHTML =
    '<span>' + label + '</span>' +
    personIcon +
    '<span style="font-size:5.5px;opacity:.75">(' + sub + ')</span>';
  return el;
}


/* ══════════════════════════════════════════════════════════
   STAIRCASE CELL
══════════════════════════════════════════════════════════ */
function mkStair(w, h) {
  const el = mkDiv('width:' + w + 'px;height:' + h + 'px;', 'stair');
  el.textContent = 'STAIRCASE';
  return el;
}


/* ══════════════════════════════════════════════════════════
   WING LABEL HELPERS
══════════════════════════════════════════════════════════ */
/* Vertical side label */
function mkSideLbl(letter, transform) {
  transform = transform || 'rotate(180deg)';
  const el = mkDiv('background:' + WC[letter] + ';transform:' + transform + ';', 'wing-side-lbl');
  el.textContent = 'WING ' + letter;
  return el;
}

/* Inline section header badge */
function mkSectionHdr(text, color) {
  const el = mkDiv('background:' + (color || '#555') + ';', 'section-hdr');
  el.textContent = text;
  return el;
}

/* Plain text note */
function mkNote(text, style) {
  const el = mkDiv(style || 'font-size:9px;color:var(--muted);');
  el.textContent = text;
  return el;
}


/* ══════════════════════════════════════════════════════════
   LAYOUT CONSTANTS  (pixel dimensions)
══════════════════════════════════════════════════════════ */
const RW  = 40;   /* standard room width                   */
const RH  = 22;   /* standard room height                  */
const SRW = 34;   /* small room width  (B-wing one-sitter) */
const SRH = 20;   /* small room height (B-wing one-sitter) */
const WW  = 88;   /* washroom width                        */
const WH  = 22;   /* washroom height                       */


/* ══════════════════════════════════════════════════════════
   SECTION BUILDERS
══════════════════════════════════════════════════════════ */

/* ──────────────────────────────────────────────
   TOP EDGE ROW  (A-Wing rooms: A[floor]11 – A[floor]16)
   Uses "A" prefix, numbered 11–16 to avoid conflict
   with A-Wing main rooms 01–10.
   Layout: [WR corner] [A11–A16] [WR corner]
   6 Two-Sitter rooms + washrooms at both ends
────────────────────────────────────────────── */
function buildTopRow(floor, bp) {
  /* Room row */
  const wrap = mkRow('justify-content:center;padding:6px 8px 4px;border-bottom:1px solid var(--court-b);gap:4px;');
  wrap.appendChild(mkWash('WR', 'Top-Left', WH, WH));

  const roomsWrap = mkRow('gap:2px;');
  for (let i = 11; i <= 16; i++) {
    /* wingPrefix='A', seedChar='A', metaKey='AT' */
    roomsWrap.appendChild(mkRoom('A', 'A', floor, i, 'AT', RW, RH));
  }
  wrap.appendChild(roomsWrap);
  wrap.appendChild(mkWash('WR', 'Top-Right', WH, WH));
  bp.appendChild(wrap);

  /* Sub-label */
  const lbl = mkDiv('text-align:center;font-size:9px;color:var(--muted);padding:2px 0;letter-spacing:.5px;border-bottom:1px solid var(--court-b);');
  lbl.textContent = 'A-Wing Top Row: 6 rooms [Two-Sitters A' + floor + '11–A' + floor + '16] + Corner Washrooms';
  bp.appendChild(lbl);
}


/* ──────────────────────────────────────────────
   A-WING
   Layout: [WING A label] [A01–A05] [OPEN CORRIDOR] [A06–A10] [WING A label]
   5 Two-Sitters left (01–05) + 5 Two-Sitters right (06–10)
   Open corridor centre — no large/special rooms
────────────────────────────────────────────── */
function buildAWing(floor, bp) {
  /* Section header bar */
  const hdr = mkDiv(
    'display:flex;align-items:center;gap:8px;' +
    'padding:5px 8px 3px;background:#eef4fd;' +
    'border-bottom:0.5px solid var(--court-b);'
  );
  hdr.appendChild(mkSectionHdr('A-WING', WC.A));
  hdr.appendChild(mkNote('Rooms A' + floor + '01–A' + floor + '05 (left) + A' + floor + '06–A' + floor + '10 (right)  ·  All Two-Sitters'));
  bp.appendChild(hdr);

  /* Body row */
  const body = mkRow('gap:0;align-items:stretch;');

  /* Left wing label */
  const leftLblWrap = mkDiv(
    'display:flex;align-items:center;background:#eef4fd;' +
    'border:1.5px solid var(--line);border-right:none;' +
    'border-radius:2px 0 0 2px;padding:0 3px;'
  );
  leftLblWrap.appendChild(mkSideLbl('A', 'rotate(180deg)'));
  body.appendChild(leftLblWrap);

  /* Left rooms — 01–05 */
  const leftRooms = mkDiv(
    'display:flex;flex-direction:column;gap:2px;padding:6px 4px;' +
    'background:#eef4fd;border:1.5px solid var(--line);' +
    'border-left:none;border-right:none;justify-content:center;'
  );
  for (let i = 1; i <= 5; i++) {
    leftRooms.appendChild(mkRoom('A', 'A', floor, i, 'A', RW, RH));
  }
  body.appendChild(leftRooms);

  /* Centre open corridor */
  const corridor = mkDiv(
    'flex:1;display:flex;flex-direction:column;align-items:center;' +
    'justify-content:center;gap:4px;padding:8px 6px;' +
    'border:1.5px solid var(--line);min-height:120px;',
    'courtyard'
  );
  corridor.style.margin = '0';
  const cLbl = mkDiv('font-size:10px;font-weight:700;letter-spacing:1.5px;color:var(--muted);');
  cLbl.textContent = 'A-WING CORRIDOR';
  const cSub = mkDiv('font-size:8px;color:var(--muted);opacity:.7;');
  cSub.textContent = '(OPEN CORRIDOR)';
  corridor.appendChild(cLbl);
  corridor.appendChild(cSub);
  body.appendChild(corridor);

  /* Right rooms — 06–10 */
  const rightRooms = mkDiv(
    'display:flex;flex-direction:column;gap:2px;padding:6px 4px;' +
    'background:#eef4fd;border:1.5px solid var(--line);' +
    'border-left:none;border-right:none;justify-content:center;'
  );
  for (let i = 6; i <= 10; i++) {
    rightRooms.appendChild(mkRoom('A', 'A', floor, i, 'A', RW, RH));
  }
  body.appendChild(rightRooms);

  /* Right wing label */
  const rightLblWrap = mkDiv(
    'display:flex;align-items:center;background:#eef4fd;' +
    'border:1.5px solid var(--line);border-left:none;' +
    'border-radius:0 2px 2px 0;padding:0 3px;'
  );
  rightLblWrap.appendChild(mkSideLbl('A', 'rotate(0deg)'));
  body.appendChild(rightLblWrap);

  bp.appendChild(body);
}


/* ──────────────────────────────────────────────
   A–B DIVIDER STRIP
   Simple visual separator between wings A & B + washroom
────────────────────────────────────────────── */
function buildABConnector(floor, bp) {
  const wrap = mkDiv(
    'display:flex;align-items:center;gap:6px;padding:5px 10px;' +
    'justify-content:center;' +
    'border-top:1px solid var(--court-b);border-bottom:1px solid var(--court-b);' +
    'background:#f6f3ee;'
  );

  wrap.appendChild(mkWash('WASHROOM', 'A–B Link', 130, WH));
  wrap.appendChild(mkNote('Shared washroom between Wing A and Wing B', 'font-size:8.5px;color:var(--muted);white-space:nowrap;'));
  bp.appendChild(wrap);
}


/* ──────────────────────────────────────────────
   B-WING
   Layout: [WING B label] [B01–B05 one-sitters] [CENTRE: B11–B17 two-sitters] [B06–B10 one-sitters] [WING B label]
   5 One-Sitters each side + 7 Two-Sitters across the centre
────────────────────────────────────────────── */
function buildBWing(floor, bp) {
  /* Section header bar */
  const hdr = mkDiv(
    'display:flex;align-items:center;gap:8px;' +
    'padding:5px 8px 3px;background:#edf8f4;' +
    'border-bottom:0.5px solid var(--court-b);border-top:1px solid var(--court-b);'
  );
  hdr.appendChild(mkSectionHdr('B-WING', WC.B));
  hdr.appendChild(mkNote('5 One-Sitters each side + 7 Two-Sitters across centre'));
  bp.appendChild(hdr);

  /* Body row */
  const body = mkRow('gap:0;align-items:stretch;');

  /* Left wing label */
  const leftLblWrap = mkDiv(
    'display:flex;align-items:center;background:#edf8f4;' +
    'border:1.5px solid var(--line);border-right:none;' +
    'border-radius:2px 0 0 2px;padding:0 3px;'
  );
  leftLblWrap.appendChild(mkSideLbl('B', 'rotate(180deg)'));
  body.appendChild(leftLblWrap);

  /* Left One-Sitter rooms (B01–B05) */
  const leftRooms = mkDiv(
    'display:flex;flex-direction:column;gap:2px;padding:6px 4px;' +
    'background:#edf8f4;border:1.5px solid var(--line);' +
    'border-left:none;border-right:none;justify-content:center;'
  );
  for (let i = 1; i <= 5; i++) {
    leftRooms.appendChild(mkRoom('B', 'B', floor, i, 'B', SRW, SRH));
  }
  body.appendChild(leftRooms);

  /* Centre — 7 Two-Sitter rooms (B11–B17) */
  const centre = mkDiv(
    'flex:1;display:flex;flex-direction:column;align-items:center;' +
    'justify-content:center;gap:4px;padding:8px 6px;' +
    'border:1.5px solid var(--line);background:var(--paper);'
  );
  const cLbl = mkDiv('font-size:9px;font-weight:700;letter-spacing:1px;color:var(--muted);');
  cLbl.textContent = 'B-WING CENTRE';
  centre.appendChild(cLbl);

  const cRooms = mkRow('gap:2px;flex-wrap:wrap;justify-content:center;');
  for (let i = 11; i <= 17; i++) {
    cRooms.appendChild(mkRoom('B', 'B', floor, i, 'BC', RW, RH));
  }
  centre.appendChild(cRooms);
  centre.appendChild(mkNote('7 Two-Sitter rooms', 'font-size:8px;color:var(--muted);opacity:.8;'));
  body.appendChild(centre);

  /* Right One-Sitter rooms (B06–B10) */
  const rightRooms = mkDiv(
    'display:flex;flex-direction:column;gap:2px;padding:6px 4px;' +
    'background:#edf8f4;border:1.5px solid var(--line);' +
    'border-left:none;border-right:none;justify-content:center;'
  );
  for (let i = 6; i <= 10; i++) {
    rightRooms.appendChild(mkRoom('B', 'B', floor, i, 'B', SRW, SRH));
  }
  body.appendChild(rightRooms);

  /* Right wing label */
  const rightLblWrap = mkDiv(
    'display:flex;align-items:center;background:#edf8f4;' +
    'border:1.5px solid var(--line);border-left:none;' +
    'border-radius:0 2px 2px 0;padding:0 3px;'
  );
  rightLblWrap.appendChild(mkSideLbl('B', 'rotate(0deg)'));
  body.appendChild(rightLblWrap);

  bp.appendChild(body);
}


/* ──────────────────────────────────────────────
   SPLIT CORRIDOR  (B-wing / C-wing divider)
────────────────────────────────────────────── */
function buildSplitCorridor(bp) {
  const wrap = mkDiv(
    'padding:5px 10px;text-align:center;margin:2px 0;' +
    'border-top:2px dashed #9b8fcc;border-bottom:2px dashed #9b8fcc;' +
    'background:repeating-linear-gradient(45deg,#ede9f5 0,#ede9f5 4px,#e5e0f0 4px,#e5e0f0 8px);'
  );
  const lbl = mkDiv('font-size:10px;font-weight:700;letter-spacing:1px;color:#6b5fa0;');
  lbl.textContent = 'SPLIT LINE  ·  B-WING / C-WING CORRIDOR';
  wrap.appendChild(lbl);
  bp.appendChild(wrap);
}


/* ──────────────────────────────────────────────
   C-WING
   Layout: [WING C label] [C01–C05] [OPEN CORRIDOR] [C06–C10] [WING C label]
   All rooms use "C" prefix. 5 Two-Sitters each side.
────────────────────────────────────────────── */
function buildCWing(floor, bp) {
  /* Section header bar */
  const hdr = mkDiv(
    'display:flex;align-items:center;gap:8px;' +
    'padding:5px 8px 3px;background:#fdf6ee;' +
    'border-bottom:0.5px solid var(--court-b);border-top:1px solid var(--court-b);'
  );
  hdr.appendChild(mkSectionHdr('C-WING', WC.C));
  hdr.appendChild(mkNote('Rooms C' + floor + '01–C' + floor + '05 (left) + C' + floor + '06–C' + floor + '10 (right)  ·  All Two-Sitters'));
  bp.appendChild(hdr);

  /* Body row */
  const body = mkRow('gap:0;align-items:stretch;');

  /* Left wing label */
  const leftLblWrap = mkDiv(
    'display:flex;align-items:center;background:#fdf6ee;' +
    'border:1.5px solid var(--line);border-right:none;' +
    'border-radius:2px 0 0 2px;padding:0 3px;'
  );
  leftLblWrap.appendChild(mkSideLbl('C', 'rotate(180deg)'));
  body.appendChild(leftLblWrap);

  /* Left rooms — C01–C05 */
  const leftRooms = mkDiv(
    'display:flex;flex-direction:column;gap:2px;padding:6px 4px;' +
    'background:#fdf6ee;border:1.5px solid var(--line);' +
    'border-left:none;border-right:none;justify-content:center;'
  );
  for (let i = 1; i <= 5; i++) {
    leftRooms.appendChild(mkRoom('C', 'C', floor, i, 'C', RW, RH));
  }
  body.appendChild(leftRooms);

  /* Open corridor centre */
  const corridor = mkDiv(
    'flex:1;display:flex;flex-direction:column;align-items:center;' +
    'justify-content:center;gap:3px;padding:8px 6px;' +
    'border:1.5px solid var(--line);min-height:100px;',
    'courtyard'
  );
  corridor.style.margin = '0';
  const cLbl = mkDiv('font-size:10px;font-weight:700;letter-spacing:1px;color:var(--muted);');
  cLbl.textContent = 'C-WING CORRIDOR';
  const cSub = mkDiv('font-size:8px;color:var(--muted);opacity:.7;');
  cSub.textContent = '(OPEN CORRIDOR)';
  corridor.appendChild(cLbl);
  corridor.appendChild(cSub);
  body.appendChild(corridor);

  /* Right rooms — C06–C10 */
  const rightRooms = mkDiv(
    'display:flex;flex-direction:column;gap:2px;padding:6px 4px;' +
    'background:#fdf6ee;border:1.5px solid var(--line);' +
    'border-left:none;border-right:none;justify-content:center;'
  );
  for (let i = 6; i <= 10; i++) {
    rightRooms.appendChild(mkRoom('C', 'C', floor, i, 'C', RW, RH));
  }
  body.appendChild(rightRooms);

  /* Right wing label */
  const rightLblWrap = mkDiv(
    'display:flex;align-items:center;background:#fdf6ee;' +
    'border:1.5px solid var(--line);border-left:none;' +
    'border-radius:0 2px 2px 0;padding:0 3px;'
  );
  rightLblWrap.appendChild(mkSideLbl('C', 'rotate(0deg)'));
  body.appendChild(rightLblWrap);

  bp.appendChild(body);
}


/* ──────────────────────────────────────────────
   BOTTOM EDGE ROW  (C-Wing bottom perimeter)
   Uses "C" prefix, numbered 11–19 (clean continuation
   after C-Wing main rooms C01–C10).
   Layout: [WR corner] [C11–C19 one-sitters] [WR corner]
   9 One-Sitter rooms + washrooms at both ends
────────────────────────────────────────────── */
function buildBottomRow(floor, bp) {
  /* Sub-label above */
  const lbl = mkDiv(
    'text-align:center;font-size:9px;color:var(--muted);' +
    'padding:2px 0;letter-spacing:.5px;border-top:1px solid var(--court-b);'
  );
  lbl.textContent = 'C-Wing Bottom Row: 9 rooms [One-Sitters C' + floor + '11–C' + floor + '19] + Corner Washrooms';
  bp.appendChild(lbl);

  /* Room row */
  const wrap = mkRow('justify-content:center;padding:4px 8px 6px;border-top:0.5px solid var(--court-b);gap:4px;');
  wrap.appendChild(mkWash('WR', 'C1 & Bottom', WH, WH));

  const roomsWrap = mkRow('gap:2px;');
  for (let i = 1; i <= 9; i++) {
    /* C11–C19; wingPrefix='C', seedChar='C', metaKey='CR' */
    roomsWrap.appendChild(mkRoom('C', 'C', floor, 10 + i, 'CR', SRW, RH));
  }
  wrap.appendChild(roomsWrap);
  wrap.appendChild(mkWash('WR', 'C2 & Bottom', WH, WH));
  bp.appendChild(wrap);
}


/* ──────────────────────────────────────────────
   FOOTER — statistics + notes
────────────────────────────────────────────── */
function buildFooter(floor, bp) {
  const footer = mkRow(
    'justify-content:space-between;align-items:flex-start;' +
    'margin-top:12px;border-top:1px solid var(--court-b);' +
    'padding-top:8px;gap:8px;flex-wrap:wrap;'
  );

  const wingsLabel =
    floor <= 2 ? '3 Wings (A + B + C)' :
    floor === 3 ? '2 Wings (A + B)'    :
    '1 Wing (B only)';

  const stats = mkDiv(null, 'stats-box');
  stats.innerHTML =
    '<strong>Floor ' + floor + ' — ' + wingsLabel + '</strong><br>' +
    'Room Code Format: [Wing][Floor][RoomNo. 2-digit]<br>' +
    'A-Top row: A' + floor + '11–A' + floor + '16  ·  A-Wing: A' + floor + '01–A' + floor + '10<br>' +
    'B-Wing: B' + floor + '01–B' + floor + '17<br>' +
    'C-Wing: C' + floor + '01–C' + floor + '10  ·  C-Bottom: C' + floor + '11–C' + floor + '19<br>' +
    '<em style="font-size:8px;opacity:.7">e.g. A101 = Wing A · Floor 1 · Room 01</em>';
  footer.appendChild(stats);

  const note = mkDiv(null, 'note-box');
  note.innerHTML =
    '<strong>ROOM TYPES:</strong><br>' +
    'A-Wing (incl. top row) = Two-Sitter<br>' +
    'B-Wing sides = One-Sitter · B-Wing centre = Two-Sitter<br>' +
    'C-Wing = Two-Sitter · C-Wing bottom row = One-Sitter<br>' +
    'C-Wing = Two-Sitter<br>' +
    'Washrooms independent per wing section';
  footer.appendChild(note);

  bp.appendChild(footer);
}


/* ══════════════════════════════════════════════════════════
   MAIN BUILD  — called every time the floor changes
   Floor 0, 1, 2  →  All three wings (A + B + C)
   Floor 3        →  Wings A + B only
   Floor 4        →  Wing B only
══════════════════════════════════════════════════════════ */
function build(floor) {
  const bp = document.getElementById('bp');
  bp.innerHTML = '';

  /* Update subtitle */
  document.getElementById('floorSub').textContent =
    floor <= 2 ? 'Floor ' + floor + ' — Wings A + B + C' :
    floor === 3 ? 'Floor ' + floor + ' — Wings A + B'    :
    'Floor ' + floor + ' — Wing B only';

  if (floor <= 2) {
    /* ── Floors 0, 1, 2 — all three wings ── */
    buildTopRow(floor, bp);
    buildAWing(floor, bp);
    buildABConnector(floor, bp);
    buildBWing(floor, bp);
    buildSplitCorridor(bp);
    buildCWing(floor, bp);
    buildBottomRow(floor, bp);

  } else if (floor === 3) {
    /* ── Floor 3 — Wings A + B only ── */
    buildTopRow(floor, bp);
    buildAWing(floor, bp);
    buildABConnector(floor, bp);
    buildBWing(floor, bp);

    const absentNote = mkDiv(
      'text-align:center;font-size:10px;color:var(--muted);' +
      'padding:10px;background:#f6f4ee;' +
      'border:1px dashed var(--court-b);margin-top:2px;border-radius:2px;'
    );
    absentNote.textContent = 'C-Wing is not present on Floor 3';
    bp.appendChild(absentNote);

  } else {
    /* ── Floor 4 — Wing B only ── */
    const noANote = mkDiv(
      'text-align:center;font-size:10px;color:var(--muted);' +
      'padding:8px;background:#eef4fd;border:1px dashed var(--court-b);'
    );
    noANote.textContent = 'A-Wing is not present on Floor 4';
    bp.appendChild(noANote);

    const topWash = mkDiv(
      'display:flex;align-items:center;gap:6px;padding:6px 10px;' +
      'background:#edf8f4;border-bottom:1px solid var(--court-b);justify-content:center;'
    );
    topWash.appendChild(mkWash('WASHROOM', 'B-Wing Top', 130, WH));
    bp.appendChild(topWash);

    buildBWing(floor, bp);

    const botWash = mkDiv(
      'display:flex;align-items:center;gap:6px;padding:6px 10px;' +
      'background:#edf8f4;border-top:1px solid var(--court-b);justify-content:center;'
    );
    botWash.appendChild(mkWash('WASHROOM', 'B-Wing Bottom', 130, WH));
    bp.appendChild(botWash);

    const noCNote = mkDiv(
      'text-align:center;font-size:10px;color:var(--muted);' +
      'padding:8px;background:#fdf6ee;border:1px dashed var(--court-b);'
    );
    noCNote.textContent = 'C-Wing is not present on Floor 4';
    bp.appendChild(noCNote);
  }

  buildFooter(floor, bp);
}


/* ══════════════════════════════════════════════════════════
   FLOOR SELECTOR
══════════════════════════════════════════════════════════ */
const selEl = document.getElementById('floorSel');

const FLOOR_LABELS = [
  'Floor 0 (GF)',
  'Floor 1',
  'Floor 2',
  'Floor 3',
  'Floor 4',
];

for (let i = 0; i < FLOOR_LABELS.length; i++) {
  const btn = document.createElement('button');
  btn.className = 'fbtn' + (i === 0 ? ' active' : '');
  btn.textContent = FLOOR_LABELS[i];
  btn.onclick = () => {
    document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    build(i);
  };
  selEl.appendChild(btn);
}

/* Initial render */
build(0);
</script>
</body>
</html>
