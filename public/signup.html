<!DOCTYPE html>
<html>
<head>
  <title>Signup</title>
  <link rel="stylesheet" href="/css/global.css">
</head>

<body>

<div class="navbar">
  <div class="nav-content">
    <div class="logo">HostelOS</div>
    <div class="links">
      <a href="/">Home</a>
      <a href="/login.html">Login</a>
    </div>
  </div>
</div>

<div class="container">
  <div class="header">
    <h1>Register User</h1>
    <p class="subtitle">Add new staff member to hostel system</p>
  </div>

  <div class="card">
    <form id="signupForm">

      <input placeholder="First Name" name="firstName" required class="input" />
      <input placeholder="Last Name" name="lastName" required class="input" />

      <select name="gender" class="input">
        <option>Male</option>
        <option>Female</option>
      </select>

      <input placeholder="Contact Number" name="contactNumber" class="input"/>
      <input placeholder="Alternate Contact" name="altContactNumber" class="input"/>

      <input type="date" name="dob" class="input"/>

      <input placeholder="Email" name="email" class="input"/>

      <input type="date" name="joiningDate" class="input"/>

      <select name="identityType" class="input">
        <option>Aadhaar</option>
        <option>PAN</option>
        <option>VoterID</option>
        <option>Passport</option>
        <option>DrivingLicense</option>
      </select>

      <input placeholder="Identity Number" name="identityNumber" class="input"/>

      <select name="role" class="input">
        <option>chief_warden</option>
        <option>warden</option>
        <option>caretaker</option>
      </select>

      <select name="hostel" class="input">
        <option>GH</option>
        <option>BH1</option>
        <option>BH2</option>
        <option>BH3</option>
        <option>BH4</option>
      </select>

      <br><br>
      <button class="btn btn-primary">Register</button>

    </form>
  </div>
</div>

<script>
document.getElementById("signupForm").onsubmit = async (e) => {
  e.preventDefault();

  const data = Object.fromEntries(new FormData(e.target));

  const res = await fetch('/api/auth/signup', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  });

  const result = await res.json();
  alert(result.message || "Done");
};
</script>

</body>
</html>
