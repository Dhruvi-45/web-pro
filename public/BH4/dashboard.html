<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Boys Hostel — Floor Plan</title>
<link rel="stylesheet" href="bh4.css">

</head>
<body>

<!-- ── PAGE HEADER ── -->
<div class="page-header">
  <div class="title-box">
    <h1>Boys Hostel &nbsp;<span style="color:var(--accent);letter-spacing:1px;">BH-4</span></h1>
    <p id="floorSub">Floor 0 (Ground Floor) — Tower A: Mess · Tower B: Active</p>
  </div>
</div>

<!-- ── FLOOR SELECTOR ── -->
<div class="floor-sel" id="floorSel"></div>

<!-- ── LEGEND ── -->
<div class="legend">
  <div class="li"><div class="lb" style="background:var(--vacant);border-color:var(--vacant-b)"></div>Vacant</div>
  <div class="li"><div class="lb" style="background:var(--single);border-color:var(--single-b)"></div>Single Occupied</div>
  <div class="li"><div class="lb" style="background:var(--double);border-color:var(--double-b)"></div>Double Occupied</div>
  <div class="li">
    <div class="lb" style="background:var(--wash);border-color:var(--wash-b);
      background-image:repeating-linear-gradient(45deg,transparent,transparent 3px,rgba(58,104,152,.25) 3px,rgba(58,104,152,.25) 6px);">
    </div>Washroom
  </div>
  <div class="li"><div class="lb" style="background:var(--court);border-color:var(--court-b)"></div>Courtyard</div>
  <div class="li"><div class="lb" style="background:#fdf6e3;border-color:#c8a84b"></div>Mess / Dining Hall</div>
</div>

<!-- ── BLUEPRINT ── -->
<div class="blueprint" id="bp"></div>

<!-- ── TOOLTIP BAR ── -->
<div class="tip" id="tip">Hover over any room to see details</div>

<script src="bh4.js"></script>
</body>
</html>
