<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

// 🔥 BAS YAHAN apna poora bh4.jsx code paste karo
// (top se bottom tak full)
const { useState } = React;

// ─── Seeded random for deterministic room statuses per floor/tower ───────────
function seededRand(seed) {
  let s = seed;
  return function () {
    s = (s * 1664525 + 1013904223) & 0xffffffff;
    return (s >>> 0) / 4294967296;
  };
}

const STATUS_OPTIONS = ["vacant", "single", "double"];

function getRoomStatus(rand) {
  const r = rand();
  if (r < 0.3) return "vacant";
  if (r < 0.65) return "single";
  return "double";
}

// ─── Styles ──────────────────────────────────────────────────────────────────
const styles = {
  app: {
    fontFamily: "'Segoe UI', Arial, sans-serif",
    background: "#1e1e2a",
    minHeight: "100vh",
    padding: "20px 16px 40px",
    color: "#e8e8f0",
  },

  // Header
  header: {
    maxWidth: 1050,
    margin: "0 auto 18px",
    borderBottom: "1px solid #2a2a3a",
    paddingBottom: 12,
    display: "flex",
    justifyContent: "space-between",
    alignItems: "flex-end",
    flexWrap: "wrap",
    gap: 8,
  },
  headerTitle: {
    fontSize: 20,
    fontWeight: 700,
    color: "#e8e8f0",
    margin: 0,
  },
  headerSub: {
    fontSize: 11,
    color: "#888",
    marginTop: 3,
    letterSpacing: 0.5,
  },
  floorBadge: {
    fontSize: 11,
    color: "#aaa",
  },

  // Floor Selector
  floorSelectorWrap: {
    maxWidth: 1050,
    margin: "0 auto 14px",
    display: "flex",
    alignItems: "center",
    gap: 8,
    flexWrap: "wrap",
  },
  floorLabel: {
    fontSize: 11,
    color: "#777",
    letterSpacing: 1,
    textTransform: "uppercase",
    marginRight: 4,
  },
  floorBtn: (active) => ({
    padding: "5px 14px",
    fontSize: 12,
    fontWeight: 500,
    border: active ? "1.5px solid #378ADD" : "1px solid #333",
    borderRadius: 6,
    background: active ? "#185FA5" : "#1e1e2a",
    color: active ? "#fff" : "#aaa",
    cursor: "pointer",
    transition: "all 0.12s",
  }),

  // Legend
  legend: {
    maxWidth: 1050,
    margin: "0 auto 16px",
    display: "flex",
    gap: 14,
    flexWrap: "wrap",
    alignItems: "center",
    padding: "8px 12px",
    background: "#161620",
    borderRadius: 8,
    border: "0.5px solid #2a2a3a",
    fontSize: 11,
    color: "#aaa",
  },
  legendItem: {
    display: "flex",
    alignItems: "center",
    gap: 5,
  },
  legendDot: (bg, border) => ({
    width: 13,
    height: 13,
    borderRadius: 3,
    background: bg,
    border: `1px solid ${border}`,
    flexShrink: 0,
  }),

  // Floor Status
  floorStatus: {
    maxWidth: 1050,
    margin: "0 auto 14px",
    fontSize: 11,
    color: "#777",
    textAlign: "center",
  },
  floorStatusHighlight: {
    color: "#378ADD",
    fontWeight: 600,
  },

  // Plan Canvas
  planCanvas: {
    maxWidth: 1050,
    margin: "0 auto",
    display: "flex",
    justifyContent: "center",
    overflowX: "auto",
    paddingBottom: 8,
  },
  towersRow: {
    display: "flex",
    alignItems: "center",
    gap: 0,
  },

  // Tower block
  towerBlock: {
    display: "flex",
    flexDirection: "column",
    alignItems: "center",
    gap: 8,
  },
  towerName: {
    fontSize: 13,
    fontWeight: 600,
    color: "#e8e8f0",
    letterSpacing: 1,
    textAlign: "center",
    paddingBottom: 4,
    borderBottom: "2px solid #185FA5",
    minWidth: 80,
  },

  // Perimeter grid container
  perimOuter: {
    position: "relative",
    width: 7 * 44 + 6 * 2,
    height: 7 * 36 + 6 * 2,
  },
  perimGrid: {
    position: "absolute",
    top: 0,
    left: 0,
    display: "grid",
    gridTemplateColumns: "repeat(7, 44px)",
    gridTemplateRows: "repeat(7, 36px)",
    gap: 2,
  },

  // Room cells
  cell: (type, status) => {
    const base = {
      display: "flex",
      alignItems: "center",
      justifyContent: "center",
      fontSize: 11,
      fontWeight: 500,
      borderRadius: 4,
      border: "0.5px solid transparent",
      cursor: "default",
      lineHeight: 1.1,
      textAlign: "center",
      userSelect: "none",
    };
    if (type === "washroom") return { ...base, background: "#B5D4F4", color: "#042C53", border: "1px solid #378ADD" };
    if (type === "empty") return { ...base, background: "transparent", border: "none" };
    if (status === "vacant") return { ...base, background: "#C0DD97", color: "#27500A", border: "1px solid #639922" };
    if (status === "single") return { ...base, background: "#FAC775", color: "#633806", border: "1px solid #BA7517" };
    return { ...base, background: "#F0997B", color: "#4A1B0C", border: "1px solid #D85A30" };
  },

  // Courtyard
  courtyard: {
    position: "absolute",
    left: 1 * (44 + 2),
    top: 1 * (36 + 2),
    width: 5 * 44 + 4 * 2,
    height: 5 * 36 + 4 * 2,
    background: "#22222e",
    border: "1px solid #2a2a3a",
    borderRadius: 4,
    display: "flex",
    flexDirection: "column",
    alignItems: "center",
    justifyContent: "center",
    gap: 3,
    pointerEvents: "none",
  },
  courtyardLabel: {
    fontSize: 11,
    fontWeight: 500,
    color: "#555",
    letterSpacing: 0.5,
  },
  courtyardSub: {
    fontSize: 9,
    color: "#444",
  },

  // Empty tower
  towerEmpty: {
    width: 7 * 44 + 6 * 2,
    height: 7 * 36 + 6 * 2,
    background: "#161620",
    border: "1px dashed #2a2a3a",
    borderRadius: 8,
    display: "flex",
    flexDirection: "column",
    alignItems: "center",
    justifyContent: "center",
    gap: 6,
    color: "#555",
    fontSize: 12,
  },
  emptyIcon: { fontSize: 22, opacity: 0.25 },
  emptyLabel: { fontSize: 10, color: "#444", letterSpacing: 0.5 },

  // Connector
  connector: {
    display: "flex",
    flexDirection: "column",
    alignItems: "center",
    justifyContent: "center",
    padding: "0 10px",
    marginTop: 30,
    gap: 5,
  },
  connectorLine: {
    width: 52,
    height: 1.5,
    background: "#378ADD",
  },
  connectorBody: {
    width: 52,
    height: 30,
    border: "1.5px solid #378ADD",
    borderRadius: 4,
    background: "#0d1a2a",
    display: "flex",
    alignItems: "center",
    justifyContent: "center",
    fontSize: 9,
    color: "#7ab8e8",
    fontWeight: 500,
    textAlign: "center",
    lineHeight: 1.3,
  },
  connectorTag: {
    fontSize: 9,
    color: "#555",
    textAlign: "center",
    letterSpacing: 0.5,
  },
};

// ─── Build perimeter cell descriptors ────────────────────────────────────────
function buildCellMap(floor, tower) {
  const map = {};
  const set = (r, c, desc) => { map[`${r},${c}`] = desc; };

  // Washrooms: top-left, bottom-right
  set(0, 0, { type: "washroom" });
  set(6, 6, { type: "washroom" });

  // Top row: cols 1–5
  for (let c = 1; c <= 5; c++) set(0, c, { type: "room", num: c });

  // Top-right corner (0,6)
  set(0, 6, { type: "room", num: 1 });

  // Left col: rows 1–5
  for (let r = 1; r <= 5; r++) set(r, 0, { type: "room", num: r });

  // Right col: rows 1–5
  for (let r = 1; r <= 5; r++) set(r, 6, { type: "room", num: r + 1 });

  // Bottom row: cols 1–5
  for (let c = 1; c <= 5; c++) set(6, c, { type: "room", num: c });

  // Bottom-left corner: empty structural
  set(6, 0, { type: "empty" });

  return map;
}

// ─── TowerGrid ───────────────────────────────────────────────────────────────
function TowerGrid({ floor, tower }) {
  const isEmpty = tower === "A" && floor === 0;

  if (isEmpty) {
    return (
      <div style={styles.towerEmpty}>
        <div style={styles.emptyIcon}>□</div>
        <div>Empty</div>
        <div style={styles.emptyLabel}>(Ground Floor)</div>
      </div>
    );
  }

  const cellMap = buildCellMap(floor, tower);
  const rand = seededRand((tower === "A" ? 1 : 7) * (floor + 1) * 31337);

  // Pre-compute statuses for room cells
  const statuses = {};
  for (let r = 0; r < 7; r++) {
    for (let c = 0; c < 7; c++) {
      const desc = cellMap[`${r},${c}`];
      if (desc && desc.type === "room") {
        statuses[`${r},${c}`] = getRoomStatus(rand);
      }
    }
  }

  const gridCells = [];
  for (let r = 0; r < 7; r++) {
    for (let c = 0; c < 7; c++) {
      const key = `${r},${c}`;
      const desc = cellMap[key] || { type: "empty" };

      // Courtyard cells (rows 1–5, cols 1–5) are covered by overlay — render transparent
      if (r >= 1 && r <= 5 && c >= 1 && c <= 5) {
        gridCells.push(<div key={key} style={{ width: 44, height: 36 }} />);
        continue;
      }

      const status = statuses[key];
      gridCells.push(
        <div
          key={key}
          title={desc.type === "room" ? `Room ${desc.num} — ${status}` : desc.type}
          style={styles.cell(desc.type, status)}
        >
          {desc.type === "washroom" ? "WR" : desc.type === "room" ? desc.num : ""}
        </div>
      );
    }
  }

  return (
    <div style={styles.perimOuter}>
      <div style={styles.perimGrid}>{gridCells}</div>
      {/* Courtyard overlay */}
      <div style={styles.courtyard}>
        <div style={styles.courtyardLabel}>Courtyard</div>
        <div style={styles.courtyardSub}>(Open to sky)</div>
      </div>
    </div>
  );
}

// ─── Connector ───────────────────────────────────────────────────────────────
function Connector() {
  return (
    <div style={styles.connector}>
      <div style={styles.connectorLine} />
      <div style={styles.connectorBody}>Common<br />Door</div>
      <div style={styles.connectorLine} />
    </div>
  );
}

// ─── FloorSelector ───────────────────────────────────────────────────────────
function FloorSelector({ floor, onSelect }) {
  return (
    <div style={styles.floorSelectorWrap}>
      <span style={styles.floorLabel}>Floor</span>
      {[0, 1, 2, 3, 4, 5, 6].map((f) => (
        <button
          key={f}
          style={styles.floorBtn(f === floor)}
          onClick={() => onSelect(f)}
        >
          {f === 0 ? "Floor 0 (GF)" : `Floor ${f}`}
        </button>
      ))}
    </div>
  );
}

// ─── Legend ──────────────────────────────────────────────────────────────────
function Legend() {
  const items = [
    { label: "Vacant", bg: "#C0DD97", border: "#639922" },
    { label: "Single Occupied", bg: "#FAC775", border: "#BA7517" },
    { label: "Double Occupied", bg: "#F0997B", border: "#D85A30" },
    { label: "Washroom", bg: "#B5D4F4", border: "#378ADD" },
    { label: "Courtyard", bg: "#22222e", border: "#2a2a3a" },
  ];
  return (
    <div style={styles.legend}>
      <strong style={{ fontSize: 11, color: "#666", marginRight: 4 }}>LEGEND:</strong>
      {items.map((item) => (
        <div key={item.label} style={styles.legendItem}>
          <div style={styles.legendDot(item.bg, item.border)} />
          <span>{item.label}</span>
        </div>
      ))}
    </div>
  );
}

// ─── FloorView ───────────────────────────────────────────────────────────────
function FloorView({ floor }) {
  return (
    <div style={styles.planCanvas}>
      <div style={styles.towersRow}>
        <div style={styles.towerBlock}>
          <div style={styles.towerName}>Tower A</div>
          <TowerGrid floor={floor} tower="A" />
        </div>
        <Connector />
        <div style={styles.towerBlock}>
          <div style={styles.towerName}>Tower B</div>
          <TowerGrid floor={floor} tower="B" />
        </div>
      </div>
    </div>
  );
}

// ─── App ─────────────────────────────────────────────────────────────────────
function App() {
  const [floor, setFloor] = useState(0);

  const statusMsg =
    floor === 0
      ? "Tower A: Empty (Ground Floor) | Tower B: Active — 20 rooms"
      : `Both towers active — 20 rooms each`;

  return (
    <div style={styles.app}>
      {/* Header */}
      <div style={styles.header}>
        <div>
          <h1 style={styles.headerTitle}>Boys Hostel — Floor Plan Visualizer</h1>
          <div style={styles.headerSub}>
            Twin Tower Complex &nbsp;|&nbsp; Floors 0–6 &nbsp;|&nbsp; 20 rooms per active tower floor
          </div>
        </div>
        <div style={styles.floorBadge}>
          Viewing:{" "}
          <span style={{ color: "#378ADD", fontWeight: 600 }}>
            Floor {floor}{floor === 0 ? " (Ground)" : ""}
          </span>
        </div>
      </div>

      {/* Floor Selector */}
      <FloorSelector floor={floor} onSelect={setFloor} />

      {/* Legend */}
      <Legend />

      {/* Status */}
      <div style={styles.floorStatus}>{statusMsg}</div>

      {/* Floor View */}
      <FloorView floor={floor} />
    </div>
  );
}
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>

</body>
</html>
