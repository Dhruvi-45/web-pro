<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Boys Hostel — BH-3</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --vacant:#d4e9b0;--vacant-b:#5a8a2a;--vacant-t:#2e5010;
  --single:#f5d08a;--single-b:#c08a10;--single-t:#5a3a05;
  --double:#f0b080;--double-b:#c05a20;--double-t:#4a1a05;
  --wash:#a0bcd8;--wash-b:#3a6898;--wash-t:#0a2040;
  --court:#e8e4d8;--court-b:#bcbaa8;
  --bg:#f0ece0;--paper:#f8f5ee;--line:#7a7060;--text:#18160e;--muted:#5a5040;--accent:#1a4a8a;
}
body{font-family:'Courier New',monospace;background:var(--bg);color:var(--text);min-height:100vh;padding:16px 12px 40px;
  background-image:repeating-linear-gradient(0deg,transparent,transparent 27px,rgba(100,90,70,.07) 27px,rgba(100,90,70,.07) 28px),
  repeating-linear-gradient(90deg,transparent,transparent 27px,rgba(100,90,70,.04) 27px,rgba(100,90,70,.04) 28px);}
.page-header{max-width:1020px;margin:0 auto 10px;display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:8px}
.title-box{border:2px solid var(--line);background:var(--paper);padding:7px 14px 8px;border-radius:2px}
.title-box h1{font-size:14px;font-weight:700;letter-spacing:.3px;color:var(--text)}
.title-box p{font-size:9.5px;color:var(--muted);margin-top:2px}
.floor-sel{display:flex;gap:5px;flex-wrap:wrap;margin:0 auto 10px;max-width:1020px}
.fbtn{padding:5px 14px;font-size:11px;font-weight:700;font-family:inherit;border-radius:2px;cursor:pointer;border:1.5px solid var(--line);background:var(--paper);color:var(--muted);letter-spacing:.5px;transition:all .12s}
.fbtn:hover{border-color:var(--accent);color:var(--accent)}
.fbtn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.legend{display:flex;gap:10px;flex-wrap:wrap;align-items:center;padding:7px 12px;background:var(--paper);border:1.5px solid var(--line);border-radius:2px;font-size:9.5px;color:var(--muted);max-width:1020px;margin:0 auto 10px;letter-spacing:.3px}
.li{display:flex;align-items:center;gap:4px}
.lb{width:14px;height:10px;border-radius:1px;border:1px solid;flex-shrink:0}
.blueprint{max-width:1020px;margin:0 auto;background:var(--paper);border:2.5px solid var(--line);border-radius:3px;padding:10px;box-shadow:4px 4px 0 rgba(0,0,0,.08),8px 8px 0 rgba(0,0,0,.04);overflow-x:auto}
.tip{background:var(--paper);border:1.5px solid var(--line);border-radius:2px;padding:5px 12px;font-size:11px;color:var(--muted);max-width:1020px;margin:8px auto 0;min-height:28px;display:flex;align-items:center;gap:8px}
.tip strong{color:var(--text)}
.room{display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;font-family:'Courier New',monospace;border-radius:1px;border:1px solid;cursor:default;user-select:none;text-align:center;line-height:1.05;transition:filter .1s,transform .1s;flex-shrink:0;letter-spacing:-.3px}
.room:hover{filter:brightness(.8);transform:scale(1.12);z-index:20;position:relative;box-shadow:0 2px 8px rgba(0,0,0,.22)}
.wash{display:flex;align-items:center;justify-content:center;flex-direction:column;font-size:6px;font-weight:700;font-family:'Courier New',monospace;background:var(--wash);border:1.5px solid var(--wash-b);color:var(--wash-t);border-radius:2px;flex-shrink:0;text-align:center;line-height:1.3;background-image:repeating-linear-gradient(45deg,transparent,transparent 3px,rgba(58,104,152,.15) 3px,rgba(58,104,152,.15) 6px)}
.courtyard{background:var(--court);border:2px solid var(--court-b);border-radius:5px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background-image:radial-gradient(ellipse at center,rgba(160,200,140,.12) 0%,transparent 65%),repeating-linear-gradient(0deg,transparent,transparent 9px,rgba(0,0,0,.025) 9px,rgba(0,0,0,.025) 10px),repeating-linear-gradient(90deg,transparent,transparent 9px,rgba(0,0,0,.025) 9px,rgba(0,0,0,.025) 10px)}
.ct-title{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1.5px}
.ct-sub{font-size:8px;color:var(--muted);opacity:.65;letter-spacing:.8px}
.tower-block{width:100%}
.section-hdr{font-size:10px;font-weight:700;letter-spacing:1.5px;padding:4px 10px;border-radius:1px;display:inline-block;color:#fff}
.tower-body{display:flex;gap:0;align-items:stretch}
.tower-side-lbl{display:flex;align-items:center;background:var(--paper);border:1.5px solid var(--line);padding:0 3px}
.tower-side-lbl.left{border-right:none;border-radius:2px 0 0 2px}
.tower-side-lbl.right{border-left:none;border-radius:0 2px 2px 0}
.wing-lbl{font-size:11px;font-weight:700;letter-spacing:1.5px;color:#fff;padding:5px 4px;writing-mode:vertical-rl;text-orientation:mixed;display:flex;align-items:center;justify-content:center;border-radius:1px}
.tower-inner{flex:1;display:flex;align-items:center;justify-content:center;border:1.5px solid var(--line);border-left:none;border-right:none;padding:6px 4px}
.connector-strip{display:flex;align-items:center;justify-content:center;padding:6px 8px;border-top:1px solid var(--court-b);border-bottom:1px solid var(--court-b);background:#f2efe8;gap:10px}
.connector-door{width:160px;height:30px;border:1.5px solid var(--wash-b);background:var(--wash);border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:var(--wash-t);letter-spacing:.5px;background-image:repeating-linear-gradient(45deg,transparent,transparent 3px,rgba(58,104,152,.15) 3px,rgba(58,104,152,.15) 6px)}
.connector-note{font-size:8px;color:var(--muted)}
.footer{display:flex;justify-content:space-between;align-items:flex-start;margin-top:12px;border-top:1px solid var(--court-b);padding-top:8px;gap:8px;flex-wrap:wrap}
.stats-box{border:1.5px solid var(--line);padding:8px 20px;background:var(--court);font-size:9px;line-height:1.9;text-align:center;border-radius:2px;flex:1}
.note-box{border:1.5px solid var(--line);padding:8px 14px;background:var(--paper);font-size:9px;line-height:1.9;border-radius:2px;flex:1}
</style>
</head>
<body>

<!-- HEADER -->
<div class="page-header">
  <div class="title-box">
    <h1>Boys Hostel &#8212; BH-3</h1>
    <p id="floorSub">Floor 0 (Ground Floor) &mdash; Both towers active</p>
  </div>
</div>

<!-- FLOOR SELECTOR -->
<div class="floor-sel" id="floorSel"></div>

<!-- LEGEND (no "LEGEND:" label) -->
<div class="legend">
  <div class="li"><div class="lb" style="background:var(--vacant);border-color:var(--vacant-b)"></div>Vacant</div>
  <div class="li"><div class="lb" style="background:var(--single);border-color:var(--single-b)"></div>Partial Occupied</div>
  <div class="li"><div class="lb" style="background:var(--double);border-color:var(--double-b)"></div>Fully Occupied</div>
  <div class="li"><div class="lb" style="background:var(--wash);border-color:var(--wash-b);background-image:repeating-linear-gradient(45deg,transparent,transparent 3px,rgba(58,104,152,.25) 3px,rgba(58,104,152,.25) 6px)"></div>Washroom</div>
  <div class="li"><div class="lb" style="background:var(--court);border-color:var(--court-b)"></div>Courtyard</div>
</div>

<!-- BLUEPRINT -->
<div class="blueprint" id="bp"></div>

<!-- TOOLTIP -->
<div class="tip" id="tip">Hover over any room to see details</div>

<script>
(function(){
'use strict';

var RW=52,RH=46,WS=52,GAP=2;
var TOWER_COLOR={A:'#1a4a8a',B:'#0d5c40'};
var TOWER_BG={A:'#eef4fd',B:'#edf8f4'};
var tipEl=document.getElementById('tip');

var SS={
  vacant:{bg:'var(--vacant)',b:'var(--vacant-b)',t:'var(--vacant-t)',lbl:'Vacant'},
  single:{bg:'var(--single)',b:'var(--single-b)',t:'var(--single-t)',lbl:'Partial Occupied'},
  double:{bg:'var(--double)',b:'var(--double-b)',t:'var(--double-t)',lbl:'Fully Occupied'}
};

function seededRand(seed){
  var s=seed;
  return function(){s=(s*1664525+1013904223)&0xffffffff;return(s>>>0)/4294967296;};
}
function getRoomStatus(rand){
  var r=rand();
  if(r<0.30)return'vacant';
  if(r<0.65)return'single';
  return'double';
}
function buildStatuses(floor,tower){
  var rand=seededRand((tower==='A'?1:7)*(floor+1)*31337);
  var map={};
  for(var i=1;i<=20;i++) map[i]=getRoomStatus(rand);
  return map;
}

/* Room label: floor*100 + n, e.g. Floor1,n7 => A107 */
function roomLabel(tower,floor,n){
  var base=floor*100+n;
  var p=base<10?'00'+base:base<100?'0'+base:String(base);
  return tower+p;
}

function div(style,cls){
  var d=document.createElement('div');
  if(cls) d.className=cls;
  if(style) d.style.cssText=style;
  return d;
}
function rowEl(extra){return div('display:flex;flex-direction:row;gap:'+GAP+'px;align-items:stretch;'+(extra||''));}
function colEl(extra){return div('display:flex;flex-direction:column;gap:'+GAP+'px;'+(extra||''));}
function spacerEl(){return div('width:'+RW+'px;height:'+RH+'px;flex-shrink:0;');}

function mkWash(sub){
  var d=div('width:'+WS+'px;height:'+RH+'px;','wash');
  d.innerHTML='<span>WR</span>'
    +'<svg width="10" height="12" viewBox="0 0 10 12" fill="none">'
    +'<circle cx="5" cy="3" r="2.2" fill="#3a6898"/>'
    +'<rect x="1.5" y="6" width="7" height="5" rx="1.5" fill="#3a6898"/>'
    +'</svg>'
    +'<span style="font-size:5.5px;opacity:.75">('+sub+')</span>';
  return d;
}

function mkRoom(tower,floor,n,statuses){
  var status=statuses[n],st=SS[status],label=roomLabel(tower,floor,n);
  var d=div('width:'+RW+'px;height:'+RH+'px;background:'+st.bg+';border-color:'+st.b+';color:'+st.t+';','room');
  d.textContent=label;
  d.onmouseenter=function(){
    tipEl.innerHTML='<strong>Room '+label+'</strong> &nbsp;&middot;&nbsp; '+st.lbl
      +' &nbsp;&middot;&nbsp; Tower&nbsp;<strong>'+tower+'</strong>'
      +' &nbsp;&middot;&nbsp; Floor&nbsp;<strong>'+floor+'</strong>';
  };
  d.onmouseleave=function(){tipEl.textContent='Hover over any room to see details';};
  return d;
}

function mkCourtyard(){
  var cW=5*RW+4*GAP,cH=5*RH+4*GAP;
  var d=div('width:'+cW+'px;height:'+cH+'px;','courtyard');
  var t=div('');t.className='ct-title';t.textContent='COURTYARD';
  var s=div('');s.className='ct-sub';s.textContent='(Open to sky)';
  d.appendChild(t);d.appendChild(s);
  return d;
}

function mkTowerGrid(floor,tower,statuses){
  var wrap=div('display:inline-flex;flex-direction:column;gap:'+GAP+'px;');
  function room(n){return mkRoom(tower,floor,n,statuses);}

  var r0=rowEl();
  r0.appendChild(mkWash('TL'));
  [1,2,3,4,5].forEach(function(n){r0.appendChild(room(n));});
  r0.appendChild(spacerEl());
  wrap.appendChild(r0);

  var mid=rowEl();
  var lc=colEl();
  [11,12,13,14,15].forEach(function(n){lc.appendChild(room(n));});
  mid.appendChild(lc);
  mid.appendChild(mkCourtyard());
  var rc=colEl();
  [6,7,8,9,10].forEach(function(n){rc.appendChild(room(n));});
  mid.appendChild(rc);
  wrap.appendChild(mid);

  var r6=rowEl();
  r6.appendChild(spacerEl());
  [16,17,18,19,20].forEach(function(n){r6.appendChild(room(n));});
  r6.appendChild(mkWash('BR'));
  wrap.appendChild(r6);

  return wrap;
}

function mkSideLbl(tower,side){
  var wrap=div('','tower-side-lbl '+side);
  var lbl=div('background:'+TOWER_COLOR[tower]+';transform:'+(side==='left'?'rotate(180deg)':'rotate(0deg)')+';','wing-lbl');
  lbl.textContent='TOWER '+tower;
  wrap.appendChild(lbl);
  return wrap;
}

function mkTowerBlock(floor,tower){
  var block=div('','tower-block');

  var hdr=div('display:flex;align-items:center;gap:8px;padding:5px 8px 3px;background:'+TOWER_BG[tower]+';border-bottom:0.5px solid var(--court-b);'+(tower==='B'?'border-top:1px solid var(--court-b);':''));
  var hdrLabel=div('background:'+TOWER_COLOR[tower]+';','section-hdr');
  hdrLabel.textContent='TOWER '+tower;
  var hdrNote=div('font-size:9px;color:var(--muted);');
  hdrNote.textContent='Rooms '+roomLabel(tower,floor,1)+' \u2013 '+roomLabel(tower,floor,20)+' \u00B7 2 washrooms (perimeter layout)';
  hdr.appendChild(hdrLabel);hdr.appendChild(hdrNote);
  block.appendChild(hdr);

  var statuses=buildStatuses(floor,tower);
  var body=div('','tower-body');
  var inner=div('background:'+TOWER_BG[tower]+';','tower-inner');
  inner.appendChild(mkTowerGrid(floor,tower,statuses));
  body.appendChild(mkSideLbl(tower,'left'));
  body.appendChild(inner);
  body.appendChild(mkSideLbl(tower,'right'));
  block.appendChild(body);
  return block;
}

function mkConnector(){
  var strip=div('','connector-strip');
  var door=div('','connector-door');door.textContent='COMMON DOOR / WASHROOM';
  var note=div('','connector-note');note.textContent='Connector between Tower A & Tower B';
  strip.appendChild(door);strip.appendChild(note);
  return strip;
}

function mkFooter(floor){
  var footer=div('','footer');
  var stats=div('','stats-box');
  stats.innerHTML='<strong>Floor '+floor+' \u2014 Twin Tower Complex</strong><br>'
    +'Tower A: '+roomLabel('A',floor,1)+' \u2013 '+roomLabel('A',floor,20)
    +' &nbsp;&middot;&nbsp; Tower B: '+roomLabel('B',floor,1)+' \u2013 '+roomLabel('B',floor,20)+'<br>'
    +'20 rooms per tower &nbsp;&middot;&nbsp; Perimeter courtyard layout';
  var note=div('','note-box');
  note.innerHTML='<strong>NOTE:</strong><br>'
    +'Perimeter layout \u2014 rooms along outer edges<br>'
    +'Courtyard in centre (open to sky)<br>'
    +'Washrooms: top-left &amp; bottom-right corners<br>'
    +'Both towers fully active on all 8 floors (0\u20137)';
  footer.appendChild(stats);footer.appendChild(note);
  return footer;
}

function build(floor){
  var bp=document.getElementById('bp');
  bp.innerHTML='';
  document.getElementById('floorSub').textContent=
    'Floor '+floor+(floor===0?' (Ground Floor)':'')+' \u2014 Both towers active';
  bp.appendChild(mkTowerBlock(floor,'A'));
  bp.appendChild(mkConnector());
  bp.appendChild(mkTowerBlock(floor,'B'));
  bp.appendChild(mkFooter(floor));
}

/* Floor selector */
var selEl=document.getElementById('floorSel');
['Floor 0 (GF)','Floor 1','Floor 2','Floor 3','Floor 4','Floor 5','Floor 6','Floor 7'].forEach(function(lbl,i){
  var btn=document.createElement('button');
  btn.className='fbtn'+(i===0?' active':'');
  btn.textContent=lbl;
  btn.onclick=function(){
    document.querySelectorAll('.fbtn').forEach(function(b){b.classList.remove('active');});
    btn.classList.add('active');
    build(i);
  };
  selEl.appendChild(btn);
});

build(0);
}());
</script>
</body>
</html>
