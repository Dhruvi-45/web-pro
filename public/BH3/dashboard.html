<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Boys Hostel — BH-3</title>
<link rel="stylesheet" href="bh3.css">
</head>
<body>

<!-- HEADER -->
<div class="page-header">
  <div class="title-box">
    <h1>Boys Hostel &#8212; BH-3</h1>
    <p id="floorSub">Floor 0 (Ground Floor) &mdash; Both towers active</p>
  </div>
</div>

<!-- FLOOR SELECTOR -->
<div class="floor-sel" id="floorSel"></div>

<!-- LEGEND (no "LEGEND:" label) -->
<div class="legend">
  <div class="li"><div class="lb" style="background:var(--vacant);border-color:var(--vacant-b)"></div>Vacant</div>
  <div class="li"><div class="lb" style="background:var(--single);border-color:var(--single-b)"></div>Partial Occupied</div>
  <div class="li"><div class="lb" style="background:var(--double);border-color:var(--double-b)"></div>Fully Occupied</div>
  <div class="li"><div class="lb" style="background:var(--wash);border-color:var(--wash-b);background-image:repeating-linear-gradient(45deg,transparent,transparent 3px,rgba(58,104,152,.25) 3px,rgba(58,104,152,.25) 6px)"></div>Washroom</div>
  <div class="li"><div class="lb" style="background:var(--court);border-color:var(--court-b)"></div>Courtyard</div>
</div>

<!-- BLUEPRINT -->
<div class="blueprint" id="bp"></div>

<!-- TOOLTIP -->
<div class="tip" id="tip">Hover over any room to see details</div>

<script src="bh3.js"></script>
</body>
</html>
